name: "cyrus"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyrus}
      POSTGRES_USER: ${POSTGRES_USER:-cyrus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyrus}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyrus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-cyrus}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cyrus}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./cyrus
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyrus}:${POSTGRES_PASSWORD:-cyrus}@postgres:5432/${POSTGRES_DB:-cyrus}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cyrus}@redis:6379/0
      FIREWORKS_KEY: ${FIREWORKS_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      FLASK_ENV: ${FLASK_ENV:-production}
      FIREWORKS_URL: ${FIREWORKS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --port=5000

  worker_helio:
    build:
      context: ./cyrus
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyrus}:${POSTGRES_PASSWORD:-cyrus}@postgres:5432/${POSTGRES_DB:-cyrus}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cyrus}@redis:6379/0
      FIREWORKS_KEY: ${FIREWORKS_KEY}
      FIREWORKS_URL: ${FIREWORKS_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m workers.helio_worker

  worker_satops:
    build:
      context: ./cyrus
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyrus}:${POSTGRES_PASSWORD:-cyrus}@postgres:5432/${POSTGRES_DB:-cyrus}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cyrus}@redis:6379/0
      FIREWORKS_KEY: ${FIREWORKS_KEY}
      FIREWORKS_URL: ${FIREWORKS_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m workers.satops_worker

  worker_gridops:
    build:
      context: ./cyrus
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyrus}:${POSTGRES_PASSWORD:-cyrus}@postgres:5432/${POSTGRES_DB:-cyrus}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cyrus}@redis:6379/0
      FIREWORKS_KEY: ${FIREWORKS_KEY}
      FIREWORKS_URL: ${FIREWORKS_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m workers.gridops_worker

  worker_commsops:
    build:
      context: ./cyrus
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyrus}:${POSTGRES_PASSWORD:-cyrus}@postgres:5432/${POSTGRES_DB:-cyrus}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cyrus}@redis:6379/0
      FIREWORKS_KEY: ${FIREWORKS_KEY}
      FIREWORKS_URL: ${FIREWORKS_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m workers.commsops_worker

  worker_commander:
    build:
      context: ./cyrus
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyrus}:${POSTGRES_PASSWORD:-cyrus}@postgres:5432/${POSTGRES_DB:-cyrus}
      RABBITMQ_URL: ${RABBITMQ_URL}
      FIREWORKS_KEY: ${FIREWORKS_KEY}
      FIREWORKS_URL: ${FIREWORKS_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cyrus}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m workers.commander_worker

volumes:
  postgres_data:
  redis_data: